name: safe_allergy2
description: "A new Flutter project for allergy management and emergency alerts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # --- Servicios de Firebase ---
  firebase_core: ^3.10.1
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.1.3
  firebase_database: ^11.3.10
  
  # --- State Management ---
  provider: ^6.0.0
  
  # --- Utilidades y UI ---
  url_launcher: ^6.3.2
  geolocator: ^13.0.1
  font_awesome_flutter: ^10.12.0
  http: ^1.3.0
  geocoding: ^3.0.0
  shared_preferences: ^2.3.5
  
  # --- Multimedia y Feedback ---
  audioplayers: ^6.1.0
  vibration: ^2.1.0

  # --- Notificaciones Locales y QR ---
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  qr_flutter: ^4.1.0
  fl_chart: ^1.1.1
  permission_handler: ^12.0.1
  workmanager: ^0.9.0
  
  # --- USB Serial para Arduino ---
  usb_serial: ^0.5.2
  
  # --- WiFi Scanning ---
  wifi_scan: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

# CONFIGURACIÓN DE ICONOS (Añadido para evitar errores con la dependencia)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  # Optimización: Declarar carpetas completas evita errores de escritura en archivos individuales
  assets:
    - assets/images/
    - assets/audio/
    - assets/audiodenotificaciones/